version: '3.8'

services:
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: agriprice-prophet-api
    ports:
      - "8000:8000"
    volumes:
      - ../data:/app/data
      - ../models:/app/models
      - ../database:/app/database
    environment:
      - ENVIRONMENT=production
      - DATABASE_URL=sqlite:///database/agriprice.db
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 2G
    restart: unless-stopped
    networks:
      - agriprice-network
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3

  ui:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: agriprice-prophet-ui
    ports:
      - "8501:8501"
    depends_on:
      - api
    environment:
      - API_URL=http://api:8000
    restart: unless-stopped
    networks:
      - agriprice-network

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - api
      - ui
    networks:
      - agriprice-network

  locust:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: agriprice-prophet-locust
    ports:
      - "8089:8089"
    command: locust -f locust/locustfile.py --host=http://api:8000
    depends_on:
      - api
    networks:
      - agriprice-network

networks:
  agriprice-network:
    driver: bridge